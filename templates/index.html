<!DOCTYPE html>

<html>

<head>

    <title>Retail Discount Prediction</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 40px;
        }

        .container{
            width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button{
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: teal;
            color: white;
            border: none;
            cursor: pointer;
        }

        h2{
            text-align: center;
        }

        .prediction{
            margin-top: 20px;
            font-size: 20px;
            color: green;
            text-align: center;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Retail Discount Prediction</h2>

    <form action="/predict" method="post">

        <input type="number" name="Quantity" placeholder="Quantity" required>

        <input type="number" step="any" name="Sales" placeholder="Sales" required>

        <input type="number" step="any" name="Profit" placeholder="Profit" required>

        <input type="text" name="Region" placeholder="Region" required>

        <input type="text" name="Category" placeholder="Category" required>

        <input type="text" name="Sub_Category" placeholder="Sub Category" required>

        <input type="text" name="Ship_Mode" placeholder="Ship Mode" required>

        <input type="text" name="Segment" placeholder="Segment" required>

        <input type="text" name="City" placeholder="City" required>

        <input type="text" name="State" placeholder="State" required>

        <button type="submit">

            Predict Discount

        </button>

    </form>

    {% if prediction %}

    <div class="prediction">

        Predicted Discount:
        {{ prediction }}

    </div>

    {% endif %}

</div>

</body>

</html>
