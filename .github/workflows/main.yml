name: ML Pipeline CI

on:
  push:
    branches:
      - main

jobs:

  train-model:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set Up Python
      uses: actions/setup-python@v4

      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Training Pipeline
      run: |
        python -m src.train
